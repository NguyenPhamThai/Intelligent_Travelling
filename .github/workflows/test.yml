name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # đổi 20 cho ổn định
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (tap)
        run: node --test --test-reporter=tap --test-reporter-destination=stdout tests/*.test.mjs tests/*.test.mts 

      - name: Edge function bundle check
        run: |
          find api/ -name "*.js" -not -name "_*" | while read f; do
            npx esbuild "$f" --bundle --format=esm --platform=browser --outfile=/dev/null || {
              echo "ERROR: esbuild failed to bundle $f"
              exit 1  
            }
          done